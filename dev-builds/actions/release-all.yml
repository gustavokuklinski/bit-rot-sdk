name: Bit Rot Release - All

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            executable_ext: .exe
            asset_name: bitrot_windows
            nuitka_flags: --windows-console-mode=disable --windows-icon-from-ico=./game/icons/favicon.ico
          
          - os: ubuntu-latest
            executable_ext: .bin
            asset_name: bitrot_linux
            nuitka_flags: 

          - os: macos-latest
            executable_ext: .app
            asset_name: bitrot_macos
            nuitka_flags: --macos-create-app-bundle --macos-app-icon=./game/icons/favicon.icns

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf ccache

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build with Nuitka
        run: |
          nuitka --onefile --assume-yes-for-downloads --output-dir=./build ${{ matrix.nuitka_flags }} bitrot.py

      - name: Prepare Staging Directory
        shell: bash
        run: |
          mkdir release
          cp -r game release/game
          mv build/bitrot${{ matrix.executable_ext }} release/bitrot${{ matrix.executable_ext }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release/ # Uploads the folder content directly
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip Artifacts for Release
        run: |
          # Go into the artifacts folder
          cd artifacts
          
          # Loop through each artifact folder (bitrot_windows, bitrot_linux)
          for dir in */ ; do
            # Remove trailing slash from directory name
            dirname=${dir%/}
            
            # Zip the CONTENTS of the directory into a zip file named after the directory
            echo "Zipping $dirname..."
            cd "$dirname"
            zip -r "../../$dirname.zip" .
            cd ..
          done
          
          echo "Created Zips:"
          ls -l ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.zip" 
          generate_release_notes: true