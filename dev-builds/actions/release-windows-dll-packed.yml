name: Bit Rot Release - Windows DLL Packed

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release on Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Build with Nuitka
        run: |
          nuitka --standalone --assume-yes-for-downloads --output-dir=./build --include-data-dir=game=game --windows-console-mode=disable --windows-icon-from-ico=./game/icons/favicon.ico bitrot.py

      - name: Prepare Staging Directory
        shell: bash
        run: |
          # Nuitka --standalone generates a folder named 'bitrot.dist' containing the .exe, DLLs, and the bundled game/ folder.
          # We simply rename this master folder to 'release' for zipping.
          mv build/bitrot.dist release

      - name: Zip Artifacts for Release
        shell: pwsh
        run: |
          Compress-Archive -Path "release\*" -DestinationPath "bitrot_windows.zip"
      
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bitrot-windows-build
          path: bitrot_windows.zip
          retention-days: 5

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: bitrot_windows.zip
          generate_release_notes: true